<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#375a7f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GxChat" />
    <meta name="google-site-verification" content="W2ez42lwANlmcKz6ng6zAXdHwiwbI-h1OohQlI3mqLg" />
    <meta name="description" content="GxChat India - The ultimate social messaging app for India. Connect with friends, share reels, and chat securely with Gothwad Technologies' latest platform." />
    <meta name="keywords" content="GxChat, GxChat India, Gothwad Technologies, Indian Chat App, Social Media India, Messaging App, Reels India, Secure Chat" />
    <meta name="author" content="Gothwad Technologies" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gxchatindia.com/" />
    <meta property="og:title" content="GxChat India | Connect, Share, Chat" />
    <meta property="og:site_name" content="GxChat India" />
    <meta property="og:description" content="GxChat India - The ultimate social messaging app for India. Connect with friends, share reels, and chat securely." />
    <meta property="og:image" content="/assets/favicon.png" />

    <!-- JSON-LD Structured Data for Site Name -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GxChat India",
        "alternateName": ["GxChat", "GxChat India App"],
        "url": "https://gxchatindia.com/"
      }
    </script>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://gxchatindia.com/" />
    <meta property="twitter:title" content="GxChat India | Connect, Share, Chat" />
    <meta property="twitter:description" content="GxChat India - The ultimate social messaging app for India. Connect with friends, share reels, and chat securely." />
    <meta property="twitter:image" content="/assets/favicon.png" />

    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>GxChat India | The Ultimate Social Messaging App</title>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
